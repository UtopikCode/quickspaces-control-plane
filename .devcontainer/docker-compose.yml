services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ..:/workspace:cached
    depends_on:
      mongo:
        condition: service_healthy
    command: sleep infinity

  mongo:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - 27017:27017
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand({ping:1})\" localhost:27017"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
