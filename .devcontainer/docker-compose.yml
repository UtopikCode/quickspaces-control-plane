version: '3.9'
services:
  app:
    image: mcr.microsoft.com/devcontainers/go:1-bookworm
    volumes:
      - ..:/workspace:cached
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LISTEN_ADDR: ":8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/quickspaces?sslmode=disable"
      EXECUTION_PROVIDER: "truenas"
    command: sleep infinity

  postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quickspaces
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
